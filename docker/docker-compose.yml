services:
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: olist-namenode
    restart: unless-stopped
    environment:
      CLUSTER_NAME: olist-category-insights
      CORE_CONF_fs_defaultFS: hdfs://namenode:8020
      HDFS_CONF_dfs_replication: 1
    ports:
      - "9870:9870"
      - "8020:8020"
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
      - ../:/workspace
    networks:
      - olist-net

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: olist-datanode
    restart: unless-stopped
    depends_on:
      - namenode
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:8020
      HDFS_CONF_dfs_replication: 1
      SERVICE_PRECONDITION: namenode:9870
    ports:
      - "9864:9864"
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
      - ../:/workspace
    networks:
      - olist-net

  hive-metastore-postgresql:
    image: bde2020/hive-metastore-postgresql:2.3.0
    container_name: olist-hive-metastore-postgresql
    restart: unless-stopped
    volumes:
      - hive_metastore_postgresql:/var/lib/postgresql/data
    networks:
      - olist-net

  hive-metastore:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: olist-hive-metastore
    restart: unless-stopped
    depends_on:
      - namenode
      - datanode
      - hive-metastore-postgresql
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:8020
      HDFS_CONF_dfs_replication: 1
      HIVE_SITE_CONF_javax_jdo_option_ConnectionURL: jdbc:postgresql://hive-metastore-postgresql/metastore
      HIVE_SITE_CONF_javax_jdo_option_ConnectionDriverName: org.postgresql.Driver
      HIVE_SITE_CONF_javax_jdo_option_ConnectionUserName: hive
      HIVE_SITE_CONF_javax_jdo_option_ConnectionPassword: hive
      HIVE_SITE_CONF_hive_metastore_warehouse_dir: /user/hive/warehouse
      SERVICE_PRECONDITION: namenode:9870 datanode:9864 hive-metastore-postgresql:5432
    command: /opt/hive/bin/hive --service metastore
    ports:
      - "9083:9083"
    volumes:
      - ../:/workspace
    networks:
      - olist-net

  hive-server:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: olist-hive-server
    restart: unless-stopped
    depends_on:
      - hive-metastore
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:8020
      HDFS_CONF_dfs_replication: 1
      HIVE_SITE_CONF_hive_metastore_uris: thrift://hive-metastore:9083
      HIVE_SITE_CONF_hive_metastore_warehouse_dir: /user/hive/warehouse
      SERVICE_PRECONDITION: hive-metastore:9083
    ports:
      - "10000:10000"
      - "10002:10002"
    volumes:
      - ../:/workspace
    networks:
      - olist-net

  spark-master:
    image: bitnami/spark:3.5.3
    container_name: olist-spark-master
    restart: unless-stopped
    depends_on:
      - namenode
      - hive-metastore
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
      HADOOP_CONF_DIR: /opt/bitnami/spark/conf
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - ../:/workspace
    networks:
      - olist-net

  spark-worker:
    image: bitnami/spark:3.5.3
    container_name: olist-spark-worker
    restart: unless-stopped
    depends_on:
      - spark-master
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
    ports:
      - "8081:8081"
    volumes:
      - ../:/workspace
    networks:
      - olist-net

volumes:
  hadoop_namenode:
  hadoop_datanode:
  hive_metastore_postgresql:

networks:
  olist-net:
    name: olist-category-insights-net

