services:
  hive-server:
    image: apache/hive:4.0.1
    container_name: olist-hive-server
    restart: unless-stopped
    environment:
      SERVICE_NAME: hiveserver2
      HIVE_CUSTOM_CONF_DIR: /opt/hive/conf
    ports:
      - "10000:10000"
      - "10002:10002"
    volumes:
      - ../:/workspace
      - hive_warehouse:/opt/hive/data/warehouse
    networks:
      - olist-net

  spark-master:
    image: apache/spark:3.5.3
    container_name: olist-spark-master
    restart: unless-stopped
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master", "--host", "0.0.0.0"]
    ports:
      - "7077:7077"
      - "18080:8080"
    volumes:
      - ../:/workspace
    networks:
      - olist-net

  spark-worker:
    image: apache/spark:3.5.3
    container_name: olist-spark-worker
    restart: unless-stopped
    depends_on:
      - spark-master
    command:
      [
        "/opt/spark/bin/spark-class",
        "org.apache.spark.deploy.worker.Worker",
        "spark://spark-master:7077",
        "--cores",
        "2",
        "--memory",
        "2G",
      ]
    ports:
      - "18081:8081"
    volumes:
      - ../:/workspace
    networks:
      - olist-net

volumes:
  hive_warehouse:

networks:
  olist-net:
    name: olist-category-insights-net
